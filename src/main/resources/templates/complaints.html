<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Complaints Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<!-- Navigation -->
<nav>
    <a href="/complaints">My Complaints</a>
    <a href="/logout">Logout</a>
    <span style="color:#9ca3af;margin-left:auto;">User Dashboard</span>
</nav>

<div class="container">
<div class="card">
<h2>Raise a New Complaint</h2>
<form th:action="@{/complaints/add}" th:object="${newComplaint}" method="post">
    <p>
        <label>Title:</label>
        <input type="text" th:field="*{title}" required/>
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </p>
    <p>
        <label>Description:</label>
        <textarea th:field="*{description}" required></textarea>
        <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
    </p>
    <button type="submit" class="btn">Submit Complaint</button>
</form>

<div class="spacer"></div>

<h2>My Complaints</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
    </tr>
    <tr th:each="c : ${complaints}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.title}"></td>
        <td th:text="${c.description}"></td>
        <td th:text="${c.status}"></td>
    </tr>
</table>

</div>
</div>

</body>
</html>
