<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav>
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/logout">Logout</a>
    <span style="color:#9ca3af;margin-left:auto;">Admin Panel</span>
</nav>

<div class="container">
<div class="card">
<h2>All Complaints</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
        <th>Created By</th>
        <th>Actions</th>
    </tr>
    <tr th:each="c : ${complaints}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.title}"></td>
        <td th:text="${c.description}"></td>
        <td th:text="${c.status}"></td>
        <td th:text="${c.createdBy}"></td>
        <td>
            <!-- Update Form -->
            <form th:action="@{'/admin/update/' + ${c.id}}" method="post" style="display:inline;">
                <select name="status">
                    <option value="Pending" th:selected="${c.status == 'Pending'}">Pending</option>
                    <option value="In-Progress" th:selected="${c.status == 'In-Progress'}">In Progress</option>
                    <option value="Resolved" th:selected="${c.status == 'Resolved'}">Resolved</option>
                </select>
                <button class="btn btn-secondary" type="submit">Update</button>
            </form>

            <!-- Delete Form -->
            <form th:action="@{'/admin/delete/' + ${c.id}}" method="post" style="display:inline;">
                <button class="btn btn-danger" type="submit" onclick="return confirm('Are you sure?')">Delete</button>
            </form>
        </td>
    </tr>
</table>
</div>
</div>
</body>
</html>
